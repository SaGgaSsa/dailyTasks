name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: daily_tasks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d daily_tasks_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/daily_tasks_test
      NEXTAUTH_SECRET: integration-test-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  docker-build:
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t daily-tasks:ci .
