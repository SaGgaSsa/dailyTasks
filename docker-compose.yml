version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: dailytasks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dailytasks-network

volumes:
  postgres_data:

networks:
  dailytasks-network:
    driver: bridge